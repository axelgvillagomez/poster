<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <title>Reforestación Urbana — AR Video</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=0.5, maximum-scale=1" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; font-family: 'Inter', sans-serif; }

        /* Loading screen */
        #loading {
            position: fixed; inset: 0;
            background: linear-gradient(160deg, #071a0a, #0d2b10, #04140a);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 9999;
            transition: opacity 0.8s ease;
        }
        #loading.hidden { opacity: 0; pointer-events: none; }

        .loading-icon { font-size: 64px; animation: pulse 2s infinite; margin-bottom: 24px; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

        .loading-title { font-size: 20px; font-weight: 700; color: #6dde6d; letter-spacing: 0.1em; }

        /* Instructions */
        #instructions {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); border: 1px solid #6dde6d; padding: 10px 20px;
            border-radius: 30px; z-index: 1000; text-align: center; color: #fff; font-size: 13px;
        }

        /* Marker Status */
        #status {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            padding: 8px 16px; border-radius: 20px; font-size: 11px; font-weight: 700;
            text-transform: uppercase; z-index: 1000; transition: 0.3s;
        }
        .status-lost { background: rgba(255,0,0,0.3); color: #ff9999; }
        .status-found { background: rgba(0,255,0,0.3); color: #99ff99; }

        video#arvideo { display: none; }
    </style>
</head>

<body>
    <!-- Hidden video element -->
    <video id="arvideo" loop autoplay muted playsinline crossorigin="anonymous">
        <source src="arbol.mp4" type="video/mp4" />
    </video>

    <div id="loading">
        <div class="loading-icon">🌿</div>
        <div class="loading-title">Cargando Experiencia AR...</div>
    </div>

    <div id="instructions">Apunta al póster para ver el video</div>
    <div id="status" class="status-lost">Buscando marcador...</div>

    <script type="importmap">
        {
            "imports": {
                "three": "./js/three.module.min.js",
                "arnft-threejs": "./js/ARnftThreejs.mjs",
                "arnft": "./js/ARnft.mjs"
            }
        }
    </script>

    <script type="module">
        import * as THREE from "three";
        import arnft from "arnft";
        const { ARnft } = arnft;
        import ARnftThreejs from "arnft-threejs";
        const { SceneRendererTJS, NFTaddTJS } = ARnftThreejs;

        // Hide loading screen
        setTimeout(() => {
            const loadEl = document.getElementById('loading');
            loadEl.classList.add('hidden');
        }, 3000);

        ARnft.init(640, 480, [["nft/poster"]], [["poster"]], "config.json", false)
            .then((nft) => {
                const video = document.getElementById("arvideo");
                video.play();

                const texture = new THREE.VideoTexture(video);
                texture.minFilter = THREE.LinearFilter;
                texture.magFilter = THREE.LinearFilter;
                texture.format = THREE.RGBAFormat;

                const material = new THREE.MeshBasicMaterial({ map: texture, side: THREE.DoubleSide });
                
                // Aspect ratio for the video (standard 16:9 or similar)
                // We'll use a plane that fits the poster well
                const geometry = new THREE.PlaneGeometry(180, 120);
                const mesh = new THREE.Mesh(geometry, material);

                // Rotate to lie flat on the marker
                mesh.rotation.x = Math.PI;
                mesh.position.y = 50;
                mesh.scale.set(1.5, 1.5, 1.5);

                document.addEventListener("containerEvent", function (ev) {
                    const canvas = document.getElementById("canvas");
                    const fov = (0.8 * 180) / Math.PI;
                    const ratio = 640 / 480;
                    
                    const config = {
                        renderer: { alpha: true, antialias: true, precision: "mediump" },
                        camera: { fov: fov, ratio: ratio, near: 0.01, far: 1000 }
                    };

                    const sceneTJS = new SceneRendererTJS(config, canvas, nft.uuid, true);
                    sceneTJS.initRenderer();

                    const nftAddTJS = new NFTaddTJS(nft.uuid);
                    nftAddTJS.add(mesh, "poster", false);

                    const statusEl = document.getElementById('status');
                    window.addEventListener("nftMarkerFound", () => {
                        statusEl.textContent = "Marcador Encontrado";
                        statusEl.className = "status-found";
                    });
                    window.addEventListener("nftMarkerLost", () => {
                        statusEl.textContent = "Buscando marcador...";
                        statusEl.className = "status-lost";
                    });

                    const animate = () => {
                        sceneTJS.draw();
                        window.requestAnimationFrame(animate);
                    };
                    animate();
                });
            })
            .catch((error) => {
                console.error("Error AR:", error);
            });
    </script>
</body>
</html>
